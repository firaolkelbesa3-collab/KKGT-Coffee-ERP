<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C3A28"/>
      <stop offset="100%" stop-color="#2E1A12"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C8873E"/>
      <stop offset="100%" stop-color="#E8B06A"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- steam -->
  <g fill="none" stroke="#E8D9C5" stroke-width="14" stroke-linecap="round" opacity="0.85">
    <path d="M196 96 c-18 -20 18 -40 0 -62"/>
    <path d="M256 86 c-18 -20 18 -40 0 -62"/>
  </g>

  <!-- saucer -->
  <ellipse cx="220" cy="386" rx="150" ry="26" fill="#E8D9C5"/>

  <!-- cup body -->
  <path d="M120 196 h190 v40 a95 95 0 0 1 -95 95 h0 a95 95 0 0 1 -95 -95 z" fill="#F5EFE6"/>
  <!-- handle -->
  <path d="M310 214 a52 52 0 0 1 0 96" fill="none" stroke="#F5EFE6" stroke-width="26"/>
  <!-- coffee surface -->
  <ellipse cx="215" cy="200" rx="95" ry="20" fill="#6F4E37"/>

  <!-- coffee bean -->
  <g transform="translate(150 300) rotate(-20)">
    <ellipse cx="0" cy="0" rx="46" ry="60" fill="#6F4E37"/>
    <path d="M0 -54 C 22 -20 -22 20 0 54" fill="none" stroke="#3E2417" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- leaf -->
  <path d="M96 360 c-34 -6 -58 -34 -58 -34 s30 -16 60 -8 c20 6 30 26 30 26 s-12 22 -32 16z" fill="#4A7C2F"/>

  <!-- growth bars -->
  <g>
    <rect x="300" y="356" width="34" height="60" rx="6" fill="url(#bar)"/>
    <rect x="346" y="320" width="34" height="96" rx="6" fill="url(#bar)"/>
    <rect x="392" y="276" width="34" height="140" rx="6" fill="url(#bar)"/>
  </g>
  <!-- arrow -->
  <path d="M300 360 l54 -40 l40 -34 l44 -36" fill="none" stroke="#F2C98A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M438 252 l16 -2 l-2 32 z" fill="#F2C98A"/>
</svg>
